<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <title>MarkLess VR</title>
</head>

<body>

<a-scene>

    <!-- Camera + Cursor -->
    <a-entity position="0 1.6 0">
        <a-camera>
            <!-- Cursor for interaction -->
            <a-cursor 
                color="white"
                fuse="true"
                fuse-timeout="1000">
            </a-cursor>

            <!-- HUD Text -->
            <a-text 
                value="Welcome to VR World"
                position="0 -0.5 -1"
                align="center"
                color="white">
            </a-text>
        </a-camera>
    </a-entity>

    <!-- Sky (Environment) -->
    <a-sky color="#111"></a-sky>

    <!-- Lights -->
    <a-light type="ambient" intensity="0.8"></a-light>
    <a-light type="directional" position="2 4 2" intensity="1"></a-light>

    <!-- Ground -->
    <a-plane 
        rotation="-90 0 0" 
        width="30" 
        height="30"
        color="#444">
    </a-plane>

    <!-- 3D Model -->
    <a-gltf-model id="box"
        src="./model/itachi.glb"
        scale="0.5 0.5 0.5"
        position="0 0 -3"
        rotation="0 360 0"
        animation="property: rotation; to: 90 360 0; loop: true; dur: 6000">
    </a-gltf-model>

</a-scene>

</body>
</html>
