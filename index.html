<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR + VR Itachi (Mobile Working)</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- AR.js (CDN - REQUIRED FOR MOBILE) -->
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
  #modeBtn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 999;
    padding: 10px 15px;
    background: black;
    color: white;
    border: none;
    font-size: 16px;
  }
</style>

<script>
let mode = "VR";

function toggleMode() {
  mode = (mode === "VR") ? "AR" : "VR";

  document.getElementById("modeBtn").innerText =
    "Switch to " + (mode === "VR" ? "AR" : "VR");

  document.getElementById("vrScene").setAttribute("visible", mode === "VR");
  document.getElementById("arScene").setAttribute("visible", mode === "AR");

  // Enable / disable AR
  let scene = document.querySelector("a-scene");
  if(mode === "AR"){
    scene.setAttribute("arjs", "sourceType: webcam; debugUIEnabled: false;");
  } else {
    scene.removeAttribute("arjs");
  }
}
</script>
</head>

<body style="margin:0; overflow:hidden;">

<button id="modeBtn" onclick="toggleMode()">Switch to AR</button>

<a-scene embedded>

  <!-- LIGHT -->
  <a-entity light="type: ambient; intensity: 1"></a-entity>
  <a-entity light="type: directional; intensity: 1" position="1 2 1"></a-entity>

  <!-- ================= VR MODE ================= -->
  <a-entity id="vrScene">

    <!-- Ground -->
    <a-plane rotation="-90 0 0" width="20" height="20" color="#dcb87d"></a-plane>

    <!-- Camera -->
    <a-entity camera look-controls position="0 1.6 3"></a-entity>

    <!-- Itachi in VR -->
    <a-gltf-model 
      src="./model/itachi.glb"
      position="0 0 -3"
      scale="2 2 2"
      rotation="0 180 0">
    </a-gltf-model>

  </a-entity>


  <!-- ================= AR MODE ================= -->
  <a-entity id="arScene" visible="false">

    <!-- Camera (required for AR) -->
    <a-camera position="0 1.6 0"></a-camera>

    <!-- Itachi in AR -->
   <a-gltf-model 
  src="./model/itachi.glb"
  position="0 1 -3"
  scale="1 1 1">
</a-gltf-model>

  </a-entity>

</a-scene>

</body>
</html>
