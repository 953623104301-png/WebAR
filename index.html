<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR + VR Itachi</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- AR -->
<script src="./aframe-ar-main/dist/aframe-ar.min.js"></script>

<style>
  #modeBtn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 999;
    padding: 10px 15px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
  }
</style>

<script>
/* =========================
   MODE SWITCH
========================= */
let mode = "VR";

function toggleMode() {
  mode = (mode === "VR") ? "AR" : "VR";
  document.querySelector("#modeBtn").innerText =
    "Switch to " + (mode === "VR" ? "AR" : "VR");

  document.querySelector("#vrScene").setAttribute("visible", mode === "VR");
  document.querySelector("#arScene").setAttribute("visible", mode === "AR");
}

/* =========================
   AR LOGIC
========================= */
AFRAME.registerComponent('ar-logic',{
  tick : function(){
    let cam = document.querySelector("#cam");
    if(!cam) return;

    let collision = cam.components.raycaster.getIntersection(this.el);
    if(!collision) return;

    let circle = document.querySelector("#circle");
    circle.setAttribute('position', collision.point);
  }
});

window.addEventListener('touchstart', function(){
  if(mode !== "AR") return;

  let box = document.querySelector("#arItachi");
  let circle = document.querySelector("#circle");
  let pos = circle.getAttribute('position');

  box.setAttribute('position', pos);
});

/* =========================
   VR MOVEMENT
========================= */
AFRAME.registerComponent('rig-wasd', {
  init: function() {
    this.keys = {};
    window.addEventListener('keydown', e => this.keys[e.code] = true);
    window.addEventListener('keyup', e => this.keys[e.code] = false);
  },
  tick: function() {
    if (mode !== "VR") return;

    const speed = 0.08;
    let pos = this.el.getAttribute('position');

    if (this.keys['KeyW']) pos.z -= speed;
    if (this.keys['KeyS']) pos.z += speed;
    if (this.keys['KeyA']) pos.x -= speed;
    if (this.keys['KeyD']) pos.x += speed;

    this.el.setAttribute('position', pos);
  }
});

/* =========================
   SIMPLE ATTACK SYSTEM
========================= */
let opponentHealth = 100;

window.addEventListener("click", () => {
  if(mode !== "VR") return;

  opponentHealth -= 10;

  let hud = document.querySelector("#hudText");

  if(opponentHealth > 0){
    hud.setAttribute("value", "Enemy HP: " + opponentHealth);
  } else {
    hud.setAttribute("value", "VICTORY!");
  }
});
</script>
</head>

<body>

<button id="modeBtn" onclick="toggleMode()">Switch to AR</button>

<a-scene>

  <!-- LIGHTING -->
  <a-entity light="type: ambient; intensity: 1"></a-entity>
  <a-entity light="type: directional; intensity: 1" position="1 2 1"></a-entity>

  <!-- =========================
       VR SCENE
  ========================= -->
  <a-entity id="vrScene" visible="true">

    <!-- Ground -->
    <a-plane rotation="-90 0 0" width="20" height="20" color="#dcb87d"></a-plane>

    <!-- Player -->
    <a-entity id="rig" position="0 1.6 3" rig-wasd>
      <a-entity camera>
        <a-text id="hudText"
                value="Enemy HP: 100"
                position="-0.4 0.3 -1"
                color="white">
        </a-text>
      </a-entity>
    </a-entity>

    <!-- ITACHI MODEL IN VR -->
    <a-gltf-model 
      id="enemy"
      src="./model/itachi.glb"
      position="0 0 -3"
      scale="2 2 2"
      rotation="0 180 0">
    </a-gltf-model>

  </a-entity>


  <!-- =========================
       AR SCENE
  ========================= -->
  <a-entity id="arScene" visible="false" ar ar-logic>

    <a-camera id="cam" ar-raycaster raycaster="objects:none;">
      <a-text id="hud"
        value="Tap to place Itachi"
        position="0 -0.2 -0.5"
        align="center">
      </a-text>
    </a-camera>

    <a-ring id="circle"
      rotation="-90 0 0"
      radius-inner="0.01"
      radius-outer="0.02">
    </a-ring>

    <!-- ITACHI MODEL IN AR -->
    <a-gltf-model id="arItachi"
      src="./model/itachi.glb"
      scale="2 2 2"
      position="0 0 0">
    </a-gltf-model>

  </a-entity>

</a-scene>

</body>
</html>
